name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Lint, typecheck, tests, build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # CI runs entirely offline against fakes / mocks. The ingestion pipeline,
    # AI providers, and Supabase are NEVER hit. We seed the bare-minimum public
    # env vars Next.js needs to compile route handlers that reference them at
    # module-load time. Real secrets live in Cloudflare and are never exposed
    # to GitHub Actions.
    env:
      NEXT_PUBLIC_SUPABASE_URL: http://localhost:54321
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-anon-key
      SUPABASE_SERVICE_ROLE_KEY: ci-service-role-key
      ANTHROPIC_API_KEY: ci-anthropic-key
      OPENAI_API_KEY: ci-openai-key
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      # Disable Next telemetry in CI.
      NEXT_TELEMETRY_DISABLED: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies (clean, lockfile-pinned)
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Tests
        run: npm run test

      - name: Production build
        run: npm run build

  # Coverage runs as a separate job so test failures do not need to wait for
  # build, and so the coverage upload step is isolated.
  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: check
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'

    env:
      NEXT_PUBLIC_SUPABASE_URL: http://localhost:54321
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-anon-key
      SUPABASE_SERVICE_ROLE_KEY: ci-service-role-key
      ANTHROPIC_API_KEY: ci-anthropic-key
      OPENAI_API_KEY: ci-openai-key
      NEXT_PUBLIC_APP_URL: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Tests with coverage
        run: npm run test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14
